<section class="container py-5">

<input
type="text"
id="searchInput"
class="form-control mb-4"
placeholder="Search Restaurants..."
>

<div class="text-center mb-4">

<button class="btn btn-main filter-btn" data-filter="all">
All
</button>

<button class="btn btn-main filter-btn" data-filter="pizza">

</button>

</button>

</button>

</div>

<div class="row g-4">

<div class="col-md-4 restaurant-item pizza">

<div class="card restaurant-card">

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800"
class="card-img-top">

<div class="card-body">

<h5>Pizza Palace</h5>

View Menu
</a>

</div>

</div>

</div>

<div class="col-md-4 restaurant-item burger">

<div class="card restaurant-card">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800"
class="card-img-top">

<div class="card-body">

<p>American Burgers</p>

View Menu
</a>

</div>

</div>

<a href="menu.html" class="btn btn-main">
View Menu
</a>

</div>

</div>
