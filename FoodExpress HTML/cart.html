<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FoodExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>

<div class="toast-container-custom" id="toastContainer"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand logo" href="index.html">
            🍔 FoodExpress
        </a>
    </div>
</nav>

<section class="container py-5" style="max-width: 800px;">
    <h1 class="text-center mb-5">Your Cart</h1>
    
    <div id="cartItems" class="mb-4"></div>
    
    <div class="card shadow-sm p-4 border-0 mb-4">
        <div class="row align-items-center g-3">
            <div class="col-md-7">
                <div class="d-flex gap-2">
                    <input type="text" id="couponCode" class="form-control" placeholder="Enter Coupon Code (e.g. SAVE50)">
                    <button id="applyCoupon" class="btn btn-main" style="white-space: nowrap;">
                        Apply
                    </button>
                </div>
            </div>
            <div class="col-md-5 text-md-end text-center">
                <h3 class="mb-0">Grand Total: ₹<span id="grandTotal">0</span></h3>
            </div>
        </div>
    </div>
    
    <div class="text-center">
        <a href="checkout.html" class="btn btn-main px-5 py-3 fs-5">
            Proceed To Checkout
        </a>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JavaScript/script.js"></script>
</body>
</html>
