<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants - FoodExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>
<body>

<div class="toast-container-custom" id="toastContainer"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand logo" href="index.html">
            🍔 FoodExpress
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="restaurants.html">Restaurants</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="container py-5">
    <h1 class="text-center mb-4">Explore Restaurants</h1>
    
    <div class="search-box mb-4" style="max-width: 600px; margin: 0 auto;">
        <input type="text" id="searchInput" class="form-control" placeholder="Search restaurants or cuisines...">
    </div>
    
    <div class="text-center mb-5">
        <div class="filter-buttons">
            <button class="btn filter-btn active" data-filter="all">All</button>
            <button class="btn filter-btn" data-filter="pizza">Pizza</button>
            <button class="btn filter-btn" data-filter="burger">Burger</button>
            <button class="btn filter-btn" data-filter="biryani">Biryani</button>
        </div>
    </div>
    
    <div id="shimmerContainer" class="row g-4 d-none">
        <div class="col-md-4">
            <div class="card restaurant-card" style="height: 350px;">
                <div class="shimmer-element w-100" style="height: 220px;"></div>
                <div class="card-body">
                    <div class="shimmer-element mb-3" style="height: 20px; width: 60%;"></div>
                    <div class="shimmer-element" style="height: 15px; width: 40%;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card restaurant-card" style="height: 350px;">
                <div class="shimmer-element w-100" style="height: 220px;"></div>
                <div class="card-body">
                    <div class="shimmer-element mb-3" style="height: 20px; width: 60%;"></div>
                    <div class="shimmer-element" style="height: 15px; width: 40%;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card restaurant-card" style="height: 350px;">
                <div class="shimmer-element w-100" style="height: 220px;"></div>
                <div class="card-body">
                    <div class="shimmer-element mb-3" style="height: 20px; width: 60%;"></div>
                    <div class="shimmer-element" style="height: 15px; width: 40%;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row g-4" id="restaurantsContainer">
        <div class="col-md-4 restaurant-item pizza">
            <div class="card restaurant-card">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="card-img-top" alt="Pizza Palace">
                <div class="card-body">
                    <h5>Pizza Palace</h5>
                    <p class="restaurant-meta">🍕 Italian Cuisine • 30 mins</p>
                    <a href="menu.html" class="btn btn-main w-100">View Menu</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 restaurant-item burger">
            <div class="card restaurant-card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" class="card-img-top" alt="Burger Hub">
                <div class="card-body">
                    <h5>Burger Hub</h5>
                    <p class="restaurant-meta">🍔 American Burgers • 25 mins</p>
                    <a href="menu.html" class="btn btn-main w-100">View Menu</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 restaurant-item biryani">
            <div class="card restaurant-card">
                <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=800" class="card-img-top" alt="Royal Biryani">
                <div class="card-body">
                    <h5>Royal Biryani</h5>
                    <p class="restaurant-meta">🍛 Authentic Indian Biryani • 35 mins</p>
                    <a href="menu.html" class="btn btn-main w-100">View Menu</a>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JavaScript/script.js"></script>
</body>
</html>
