<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FoodExpress</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

<div class="toast-container-custom" id="toastContainer"></div>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand logo" href="index.html">
            🍔 FoodExpress
        </a>
    </div>
</nav>

<section class="container py-5" style="max-width: 600px;">
    <h1 class="text-center mb-5">Checkout</h1>
    
    <div class="card shadow-sm p-4 border-0">
        <form id="checkoutForm" novalidate>
            <div class="form-group-val">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter full name">
                <div class="invalid-feedback" id="nameFeedback">Please enter your full name (at least 3 characters, letters only).</div>
            </div>
            
            <div class="form-group-val">
                <label for="mobile">Mobile Number</label>
                <input type="text" id="mobile" class="form-control" placeholder="10-digit mobile number">
                <div class="invalid-feedback" id="mobileFeedback">Please enter a valid 10-digit mobile number.</div>
            </div>
            
            <div class="form-group-val">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com">
                <div class="invalid-feedback" id="emailFeedback">Please enter a valid email address containing '@' and a domain.</div>
            </div>
            
            <div class="form-group-val">
                <label for="address">Delivery Address</label>
                <textarea id="address" class="form-control" rows="4" placeholder="Enter delivery address details"></textarea>
                <div class="invalid-feedback" id="addressFeedback">Please enter a valid address (at least 5 characters).</div>
            </div>
            
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-main w-100">
                    Place Order
                </button>
            </div>
        </form>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JavaScript/script.js"></script>
<script src="script.js"></script>
</body>
</html>
