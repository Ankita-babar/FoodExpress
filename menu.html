<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - FoodExpress</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../CSS/style.css">
<link rel="stylesheet" href="../CSS/responsive.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
<div class="container">

<a class="navbar-brand logo" href="index.html">
FoodExpress
</a>

<div>
<a href="cart.html" class="btn btn-main">
Cart (<span id="cartCount">0</span>)
</a>
</div>

</div>
</nav>

<section class="container py-5">

<h1 class="text-center mb-5">
Restaurant Menu
</h1>

<div class="row g-4">

<div class="col-md-4">
<div class="card restaurant-card">

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="card-img-top">

<div class="card-body">

<h5>Margherita Pizza</h5>

<p>₹249</p>

<button class="btn btn-main add-cart"
data-name="Margherita Pizza"
data-price="249">
Add To Cart
</button>

</div>
</div>
</div>

<div class="col-md-4">
<div class="card restaurant-card">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" class="card-img-top">

<div class="card-body">

<h5>Cheese Burger</h5>

<p>₹199</p>

<button class="btn btn-main add-cart"
data-name="Cheese Burger"
data-price="199">
Add To Cart
</button>

</div>
</div>
</div>

<div class="col-md-4">
<div class="card restaurant-card">

<img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=800" class="card-img-top">

<div class="card-body">

<h5>Chicken Biryani</h5>

<p>₹299</p>

<button class="btn btn-main add-cart"
data-name="Chicken Biryani"
data-price="299">
Add To Cart
</button>

</div>
</div>
</div>

</div>

<div class="text-center mt-5">

<a href="cart.html" class="btn btn-success">
Go To Cart
</a>

</div>

</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JavaScript/script.js"></script>

</body>
</html>
